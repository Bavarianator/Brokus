# ─────────────────────────────────────────────────────────────
# brokus – KI-Prompts (Verbessert: Struktur, Constraints, Chain-of-Thought)
# ─────────────────────────────────────────────────────────────

system_prompt: |
  Du bist ein erstklassiger, professioneller Romanautor mit langjähriger Erfahrung.
  Dein Ziel ist es, fesselnde, tiefgründige und konsistente Geschichten zu schreiben.
  
  ARBEITSWEISE:
  1. DNA-TREUE: Du hältst dich AUSSCHLIESSLICH an die bereitgestellte Buch-DNA (Protagonist, Setting, Pflichtelemente). Jede Abweichung von der DNA ist ein Fehler.
  2. SPANNUNGSBOGEN: Du arbeitest präzise auf die Phasen im Handlungsbogen hin.
  3. KONSISTENZ: Du behältst die bisherige Geschichte, Charakter-Entwicklung und Informationen strikt bei. Widersprüche sind strikt zu vermeiden.
  4. "SHOW, DON'T TELL": Beschreibe Szenen, Emotionen und Handlungen durch das, was Figuren tun und fühlen. Vermeide abstrakte Erklärungen.
  5. STIL: Lebendig, fesselnd, sinnlich. Vermeide Klischees, Füllwörter und passive Formulierungen.
  6. QUALITÄT: Jedes Kapitel muss eine abgeschlossene Einheit mit einem Ziel sein.

# ─────────────────────────────────────────────────────────────
# Stufe 0: DNA-Extraktion
# ─────────────────────────────────────────────────────────────
dna_extraction_prompt: |
  Analysiere die Buchidee und extrahiere die unveränderliche BUCH-DNA.
  Dies ist das Fundament des Romans.
  
  BUCHIDEE:
  {user_idea}
  
  Extrahiere strikt als JSON (kein Text davor/danach):
  {
    "protagonistin": { "name": "...", "alter_start": 0, "geschlecht": "...", "rolle": "..." },
    "protagonist": { "name": "...", "alter_start": 0, "geschlecht": "...", "rolle": "..." },
    "setting": { "ort": "...", "ausgangssituation": "..." },
    "zeitspanne": "...",
    "perspektive": "...",
    "pflicht_handlungselemente": [{"name": "...", "description": "..."}],
    "verbotene_abweichungen": ["..."],
    "themen_pflicht": ["..."],
    "ton": "..."
  }

# ─────────────────────────────────────────────────────────────
# Stufe 1: Synopsis
# ─────────────────────────────────────────────────────────────
synopsis_prompt: |
  Erstelle eine detaillierte, dramaturgisch strukturierte Synopsis (800-1200 Wörter).
  
  BUCHIDEE: {book_idea}
  KERNELEMENTE: {core_elements}
  GENRE: {genre}
  HINWEISE: {style_hints}
  
  STRUKTUR:
  1. EXPOSITION: Status Quo, Protagonist, Welt, Motivation.
  2. AUSLÖSER: Das Ereignis, das die Geschichte in Gang setzt.
  3. STEIGENDE HANDLUNG: Die wichtigsten Wendepunkte und Konflikte.
  4. HÖHEPUNKT: Der finale Konflikt.
  5. AUFLÖSUNG: Nachwirkungen, neue Weltordnung.
  
  Schreibe auf {language}.

# ─────────────────────────────────────────────────────────────
# Stufe 1b: Kernelemente-Extraktion (core_elements_prompt)
# ─────────────────────────────────────────────────────────────
core_elements_prompt: |
  Analysiere die folgende Buchidee und extrahiere die Kernelemente.
  
  BUCHIDEE:
  {book_idea}
  
  Extrahiere die folgenden Informationen als JSON (kein Text davor/danach):
  {
    "setting": {
      "world": "...",
      "location": "...",
      "time_period": "...",
      "atmosphere": "..."
    },
    "protagonist": {
      "name": "...",
      "age": "...",
      "traits": ["..."],
      "motivation": "...",
      "internal_conflict": "..."
    },
    "characters": [
      {
        "name": "...",
        "role": "...",
        "traits": ["..."]
      }
    ],
    "core_conflict": "...",
    "mandatory_elements": [
      {
        "id": "...",
        "description": "..."
      }
    ],
    "themes": ["..."],
    "tone": "...",
    "constraints": ["..."]
  }

# ─────────────────────────────────────────────────────────────
# Stufe 2: Charakterprofile (character_prompt)
# ─────────────────────────────────────────────────────────────
character_prompt: |
  Erstelle detaillierte Charakterprofile für die Figuren dieser Geschichte.
  
  BUCHIDEE: {book_idea}
  SYNOPSIS: {synopsis}
  KERNELEMENTE: {core_elements}
  
  WICHTIG: Mindestens der Protagonist und 2-4 Nebenfiguren. Jeder Charakter braucht einen vollständigen Bogen.
  
  ANWEISUNGEN ZUM AUSGABEFORMAT – GENAU BEFOLGEN:
  - Antworte AUSSCHLIESSLICH mit einem JSON-Objekt.
  - KEIN Text vor dem JSON. KEIN Text nach dem JSON.
  - KEINE Markdown-Formatierung. KEINE Codeblöcke (```).
  - KEINE Erklärungen, KEINE Kommentare, NUR das JSON.
  - Verwende GENAU diese Struktur – kein zusätzliches Feld, keine andere Schachtelung:
  {
    "characters": [
      {
        "name": "...",
        "age": 0,
        "appearance": "...",
        "personality": "...",
        "background": "...",
        "motivation": "...",
        "internal_conflict": "...",
        "external_conflict": "...",
        "relationships": "...",
        "speech_patterns": "...",
        "arc": "..."
      }
    ]
  }

# ─────────────────────────────────────────────────────────────
# Stufe 3: Kapitelplan (chapter_plan_prompt)
# ─────────────────────────────────────────────────────────────
chapter_plan_prompt: |
  Plane {num_chapters} Kapitel für diesen Roman.
  
  BUCHIDEE: {book_idea}
  SYNOPSIS: {synopsis}
  CHARAKTERE: {characters}
  KERNELEMENTE: {core_elements}
  
  NOCH NICHT VERWENDETE PFLICHTELEMENTE:
  {pending_elements}
  
  WICHTIGE INHALTLICHE VORGABEN:
  - Verteile die Pflichtelemente sinnvoll über die Kapitel
  - Jedes Kapitel braucht einen klaren Spannungsbogen
  - Die Kapitel sollten eine dramatische Kurve ergeben: Einleitung → Steigerung → Höhepunkt → Auflösung

  ANWEISUNGEN ZUM AUSGABEFORMAT – GENAU BEFOLGEN:
  - Antworte AUSSCHLIESSLICH mit einem JSON-Objekt.
  - KEIN Text vor dem JSON. KEIN Text nach dem JSON.
  - KEINE Markdown-Formatierung. KEINE Codeblöcke (```).
  - KEINE Erklärungen, KEINE Kommentare, NUR das JSON.
  - Verwende GENAU diese Struktur – kein zusätzliches Feld, keine andere Schachtelung:
  {
    "chapters": [
      {
        "number": 1,
        "title": "...",
        "summary": "...",
        "elements": ["elem_1", "elem_2"],
        "characters": ["..."],
        "setting": "...",
        "mood": "...",
        "estimated_words": 2000
      }
    ]
  }

# ─────────────────────────────────────────────────────────────
# Kapitel-Schreib-Prompt (Verbessert mit mehr Kontext)
# ─────────────────────────────────────────────────────────────
chapter_prompt_with_dna: |
  Du bist Romanautor und schreibst Kapitel {chapter_number} ("{chapter_title}").
  
  ===== BUCH-DNA (UNVERÄNDERLICH) =====
  {dna_block}
  
  ===== WELT & THEMEN =====
  {core_context}
  
  ===== HANDLUNGSKONTEXT =====
  Phase: {story_phase}
  Synopsis: {synopsis}
  Bisherige Geschichte: {story_context}
  
  ===== PFICHTELEMENTE FÜR DIESES KAPITEL =====
  {chapter_elements}
  
  ===== CHARAKTERE =====
  {characters}
  
  VOLLSTÄNDIGE CHARAKTERPROFILE:
  {character_profiles}
  
  ===== DEINE AUFGABE =====
  Schreibe Kapitel {chapter_number} "{chapter_title}" als VOLLSTÄNDIGEN, DETAILLIERTEN ROMANTEXT.
  Das Kapitel muss MINDESTENS {target_words} WÖRTER umfassen.
  Sprache: {language}
  
  WICHTIGE ANWEISUNGEN:
  1. LÄNGE: Das Kapitel muss mindestens {target_words} Wörter lang sein. Kurze Texte sind NICHT akzeptabel.
  2. DNA-TREUE: Halte dich exakt an die Buch-DNA (Protagonist, Setting, Pflichtelemente).
  3. KONTINUITÄT: Integriere Ereignisse aus der bisherigen Geschichte organisch.
  4. SPANNUNG: Erzeuge eine fesselnde Szene mit Anfang, Mitte und Höhepunkt.
  5. DETAIL: Beschreibe Szenen, Dialoge, Gedanken und Emotionen ausführlich.
  6. QUALITÄT: Lebendige Sprache, "Show, don't tell", keine Füllwörter.
  {chapter_context_extra}
  
  WICHTIG: Deine Antwort muss AUSSCHLIESSLICH den Kapiteltext enthalten.
  KEINE Zusammenfassung, KEIN Report, KEINE Notizen am Ende.
  NUR der reine Romantext – beginnend mit dem ersten Satz des Kapitels.
  
  Beginne jetzt mit dem Kapiteltext.
  {target_words} WÖRTER – NICHT KÜRZER!
