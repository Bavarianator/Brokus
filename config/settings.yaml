# ─────────────────────────────────────────────────────────────
# brokus – Settings (Erweitert: 30+ Provider, AI-Params, Custom-Endpoint)
# ─────────────────────────────────────────────────────────────

ai:
  provider: anthropic             # Provider-Key (siehe providers)
  model: claude-sonnet-4-5       # Modell-Name
  temperature: 0.7               # 0.0 = deterministisch, 1.0 = kreativ
  max_tokens: 4000
  top_p: null                    # Nucleus Sampling (0.0-1.0, null = aus)
  frequency_penalty: null        # Wiederholungs-Strafe (-2.0 bis 2.0, null = aus)
  presence_penalty: null         # Anwesenheits-Strafe (-2.0 bis 2.0, null = aus)
  max_retries: 3
  retry_delay: 1.0               # Basis-Verzögerung (exponentieller Backoff)
  custom_base_url: null          # Override base_url (für openai_compat / Proxies)

# ── Provider Registry ──
# Jeder Provider hat: key, name, base_url, api_key_env, library, models
providers:
  # ── Lokal / Offline ──
  ollama_local:
    name: "Ollama (Lokal)"
    base_url: "http://localhost:11434/v1"
    api_key_env: "ollama"
    library: openai
    models: ["llama3.3:70b", "mistral:7b", "gemma3:27b", "phi4:14b", "qwen3:32b", "deepseek-r1:32b"]
    cost: "Kostenlos"
    note: "GPU erforderlich, komplett offline"

  ollama_cloud:
    name: "Ollama Cloud"
    base_url: "https://ollama.com"
    api_key_env: "OLLAMA_API_KEY"
    library: ollama_cloud
    models: ["gpt-oss:120b-cloud", "kimi-k2.6", "minimax-m2", "glm-4.5", "qwen3-next", "deepseek-v4-flash"]
    cost: "Pay-per-use"
    note: "Keine GPU nötig"

  lmstudio:
    name: "LM Studio (Lokal)"
    base_url: "http://localhost:1234/v1"
    api_key_env: "lm-studio"
    library: openai
    models: ["local-model"]
    cost: "Kostenlos"
    note: "GUI, OpenAI-kompatibel, offline"

  localai:
    name: "LocalAI"
    base_url: "http://localhost:8080/v1"
    api_key_env: ""
    library: openai
    models: ["local-model"]
    cost: "Kostenlos"
    note: "Docker, OpenAI-kompatibel"

  # ── Premium Cloud ──
  openai:
    name: "OpenAI"
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    library: openai
    models: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo", "o3", "o4-mini", "o1-preview", "o1-mini"]
    cost: "0.15–60$ / 1M Tokens"

  anthropic:
    name: "Anthropic (Claude)"
    base_url: null
    api_key_env: "ANTHROPIC_API_KEY"
    library: anthropic
    models: ["claude-opus-4-1", "claude-opus-4-5", "claude-sonnet-4-5", "claude-haiku-3-5"]
    cost: "0.25–75$ / 1M Tokens"
    note: "200k Kontext-Fenster"

  google:
