advanced:
  cache_responses: true
  max_cache_size_mb: 500
  parallel_chapters: 1
  request_timeout: 300
  streaming: false
  use_extended_thinking: false
ai:
  custom_base_url: null
  frequency_penalty: null
  max_retries: 3
  max_tokens: 4000
  model: claude-sonnet-4-5
  presence_penalty: null
  provider: anthropic
  retry_delay: 1.0
  temperature: 0.7
  top_p: null
generation:
  auto_export: false
  auto_open_after_export: true
  auto_retry: true
  backup_count: 5
  backup_enabled: true
  chapter_delay: 2.0
  compliance_threshold: 80
  default_chapters: 20
  default_genre: drama
  default_language: Deutsch
  detail_level: standard
  export_formats:
  - md
  - epub
  max_chapter_words: 3000
  max_chapters: 50
  max_retries: 3
  min_chapter_words: 1500
  min_chapters: 5
  save_drafts: true
  story_pace: balanced
