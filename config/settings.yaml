# ─────────────────────────────────────────────────────────────

generation:
  min_chapter_words: 1500
  max_chapter_words: 3000
  compliance_threshold: 80
  auto_retry: true
  max_retries: 3
  default_chapters: 20
  max_chapters: 50
  min_chapters: 5
  chapter_delay: 2.0            # Sekunden Pause zwischen Kapiteln
  default_language: "Deutsch"   # Standardsprache für neue Bücher
  default_genre: "drama"        # Standard-Genre
  story_pace: "balanced"        # "slow" | "balanced" | "fast"
  detail_level: "standard"      # "loose" | "standard" | "detailed" | "strict"
  auto_export: false            # Nach Generation automatisch exportieren
  auto_open_after_export: true  # Datei nach Export öffnen
  export_formats: ["md", "epub"] # Standard-Export-Formate
  backup_enabled: true          # Vor jeder Generation ein Backup machen
  backup_count: 5               # Wie viele Backups behalten
  save_drafts: true             # Zwischendrafts speichern

ui:
  theme: dark
  animations: true
  log_level: "INFO"             # "DEBUG" | "INFO" | "WARNING" | "ERROR"
  language: "de"                # UI-Sprache: "de" | "en" | "fr" | "es" | "it"
  show_token_count: true        # Token-Verbrauch anzeigen
  show_cost_estimate: true      # Geschätzte Kosten anzeigen
  progress_style: "bar"         # "bar" | "spinner" | "dots"
  confirm_quit: true            # Vor Beenden nachfragen

storage:
  database_path: data/projects.db
  books_path: data/books
  backups_path: data/backups
  max_projects: 0               # 0 = unbegrenzt

advanced:
  # Erweiterte AI-Parameter (überschreiben ai.* wenn gesetzt)
  use_extended_thinking: false  # Reasoning-Modelle mit Gedankenkette
  parallel_chapters: 1          # Kapitel parallel generieren (1 = seriell)
  request_timeout: 300          # Sekunden pro API-Request
  streaming: false              # Token-Stream an UI (Experimentell)
  cache_responses: true         # AI-Antworten cachen
  max_cache_size_mb: 500
